<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pong</title>
    <meta name="description" content="Pong - Juego web hecho en Java con WebFX y TeaVM."/>

    <style>
        :root {
            --bg: #050816;
            --panel: rgba(15, 23, 42, 0.86);
            --panel-border: rgba(148, 163, 184, 0.22);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #a78bfa;
            --green: #34d399;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background:
                radial-gradient(circle at 18% 18%, rgba(56, 189, 248, 0.20), transparent 30%),
                radial-gradient(circle at 85% 78%, rgba(168, 85, 247, 0.18), transparent 34%),
                linear-gradient(135deg, #020617 0%, #0f172a 50%, #111827 100%);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.14;
            background-image:
                linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black, transparent 75%);
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 22px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 18px;
        }

        .topbar,
        .stage,
        .footer {
            width: min(100%, 1100px);
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .logo {
            width: 46px;
            height: 46px;
            flex: 0 0 auto;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 12px 40px rgba(56, 189, 248, 0.24);
            font-weight: 900;
            color: #f8fafc;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 46px);
            line-height: 1;
            letter-spacing: -0.055em;
            white-space: nowrap;
        }

        h1 span {
            color: var(--accent);
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .status {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 13px;
            border: 1px solid var(--panel-border);
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.72);
            color: var(--muted);
            font-size: 13px;
            backdrop-filter: blur(12px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--green);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.9);
        }

        .stage {
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-card {
            width: fit-content;
            max-width: 100%;
            border-radius: 28px;
            border: 1px solid var(--panel-border);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
                var(--panel);
            box-shadow:
                0 28px 90px rgba(0, 0, 0, 0.42),
                inset 0 0 0 1px rgba(255,255,255,0.04);
            overflow: hidden;
            backdrop-filter: blur(18px);
            padding: 14px;
        }

        .game-frame-wrap {
            width: min(900px, calc(100vw - 72px));
            aspect-ratio: 900 / 600;
            border-radius: 18px;
            overflow: hidden;
            background: #05070b;
            border: 1px solid rgba(255,255,255,0.14);
            margin: 0 auto;
        }

        .game-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: #05070b;
        }

        .hint {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px 8px 2px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .key {
            min-width: 30px;
            height: 28px;
            padding: 0 8px;
            display: inline-grid;
            place-items: center;
            border-radius: 9px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            box-shadow: inset 0 -2px 0 rgba(255,255,255,0.05);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
        }

        .accent {
            color: var(--accent);
        }

        @media (max-width: 760px) {
            .page {
                padding: 14px;
                gap: 14px;
            }

            .topbar,
            .footer {
                align-items: flex-start;
                flex-direction: column;
            }

            .status {
                display: none;
            }

            .brand p {
                display: none;
            }

            h1 {
                white-space: normal;
                font-size: clamp(26px, 9vw, 40px);
            }

            .game-card {
                padding: 10px;
                border-radius: 22px;
            }

            .game-frame-wrap {
                width: calc(100vw - 48px);
                aspect-ratio: 900 / 600;
                border-radius: 14px;
            }

            .hint {
                font-size: 12px;
                gap: 7px;
            }

            .key {
                min-width: 28px;
                height: 26px;
                font-size: 11px;
            }
        }

        @media (max-height: 760px) {
            .page {
                padding-top: 14px;
                padding-bottom: 14px;
                gap: 12px;
            }

            .logo {
                width: 40px;
                height: 40px;
                border-radius: 14px;
            }

            h1 {
                font-size: clamp(24px, 3vw, 38px);
            }

            .brand p {
                display: none;
            }

            .hint {
                padding-top: 10px;
            }
        }
    </style>
</head>

<body>
<div class="grid-bg"></div>

<div class="page">
    <header class="topbar">
        <div class="brand">
            <div class="logo">P</div>
            <div>
                <h1>Shrink Speed <span>Pong</span></h1>
                <p>Java + WebFX + TeaVM · ejecutándose en navegador</p>
            </div>
        </div>

        <div class="status">
            <span class="status-dot"></span>
            Web build listo
        </div>
    </header>

    <main class="stage">
        <section class="game-card">
            <div class="game-frame-wrap">
                <iframe
                    id="gameFrame"
                    class="game-frame"
                    src="./game.html"
                    title="Pong"
                    allow="autoplay"
                ></iframe>
            </div>

            <div class="hint">
                <span>Click en el juego</span>
                <span class="key">SPACE</span>
                <span>empezar</span>
                <span class="key">W</span>
                <span class="key">S</span>
                <span>izquierda</span>
                <span class="key">↑</span>
                <span class="key">↓</span>
                <span>derecha</span>
            </div>
        </section>
    </main>

    <footer class="footer">
        <span>Proyecto académico · Taller Videojuego Solo</span>
        <span>Compilado a <span class="accent">JavaScript</span></span>
    </footer>
</div>

<script>
    (function () {
        var frame = document.getElementById("gameFrame");

        function focusGame() {
            if (frame) {
                frame.focus();
            }
        }

        if (frame) {
            frame.addEventListener("load", focusGame);
            frame.addEventListener("click", focusGame);
        }

        window.addEventListener("keydown", function () {
            focusGame();
        });
    })();
</script>
</body>
</html>
